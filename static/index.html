<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OmniVoice Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; }
    .voice-card { cursor: pointer; transition: border-color .15s; }
    .voice-card:hover { border-color: #6ea8fe !important; }
    .voice-card.selected { border-color: #0d6efd !important; background: #0d1b2a; }
    .tag-btn { font-family: monospace; font-size: .75rem; padding: .15rem .45rem; }
    .tag-section { display: flex; flex-wrap: wrap; gap: .3rem; align-items: center; }
    #text-input { font-family: monospace; min-height: 130px; }
    .audio-box { background: #161b22; border-radius: 8px; padding: 1rem; }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ─── Navbar ──────────────────────────────────────────────── -->
<nav class="navbar navbar-dark sticky-top" style="background:#161b22; border-bottom:1px solid #30363d">
  <div class="container-fluid">
    <span class="navbar-brand fw-semibold">
      <i class="bi bi-mic-fill text-primary me-2"></i>OmniVoice Studio
    </span>
    <span id="status-badge" class="badge bg-secondary">
      <span class="spin me-1">⟳</span> loading model…
    </span>
  </div>
</nav>

<div class="container-fluid py-3 px-3">
<div class="row g-3">

<!-- ─── LEFT: Voice Library ─────────────────────────────────── -->
<div class="col-lg-3 col-md-4">
  <div class="card border-0" style="background:#161b22">
    <div class="card-header d-flex justify-content-between align-items-center border-0 pb-2"
         style="background:transparent">
      <span class="fw-semibold text-secondary text-uppercase" style="font-size:.75rem; letter-spacing:.05em">
        Voice Library
      </span>
      <button class="btn btn-sm btn-outline-primary px-2 py-0"
              onclick="openCreateModal()" data-bs-toggle="modal" data-bs-target="#createModal">
        <i class="bi bi-plus-lg me-1"></i>New
      </button>
    </div>
    <div class="card-body p-0">
      <!-- Auto option always available -->
      <div class="voice-card p-2 mb-1 rounded border border-secondary selected"
           id="voice-auto-card" onclick="selectVoice(null)">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-shuffle text-secondary"></i>
          <div>
            <div class="fw-medium" style="font-size:.85rem">Auto</div>
            <div class="text-muted" style="font-size:.73rem">Random voice each time</div>
          </div>
        </div>
      </div>
      <!-- Dynamic voice list -->
      <div id="voice-list" class="d-flex flex-column gap-1"></div>
      <div id="voice-list-empty" class="text-muted text-center py-3 d-none"
           style="font-size:.8rem">No saved voices yet.<br>Create one to reuse it.</div>
    </div>
  </div>
</div>

<!-- ─── RIGHT: Studio ───────────────────────────────────────── -->
<div class="col-lg-9 col-md-8">
  <div class="card border-0" style="background:#161b22">
    <div class="card-body p-3">

      <!-- Active voice row -->
      <div class="d-flex align-items-center gap-2 mb-3">
        <span class="text-secondary" style="font-size:.8rem; text-transform:uppercase; letter-spacing:.05em">
          Voice
        </span>
        <span id="active-voice-badge" class="badge bg-primary">Auto</span>
      </div>

      <!-- Inline voice params (shown when no saved voice selected) -->
      <div id="inline-voice-panel" class="mb-3">
        <div class="row g-2 align-items-end">
          <div class="col-auto">
            <label class="form-label mb-1" style="font-size:.8rem">Mode</label>
            <select class="form-select form-select-sm" id="inline-mode" onchange="onInlineModeChange()"
                    style="min-width:110px">
              <option value="auto">Auto</option>
              <option value="design">Voice Design</option>
              <option value="clone">Voice Clone</option>
            </select>
          </div>
          <!-- Design fields -->
          <div class="col" id="inline-design-fields" style="display:none">
            <label class="form-label mb-1" style="font-size:.8rem">Instruct</label>
            <input type="text" class="form-control form-control-sm font-monospace" id="inline-instruct"
                   placeholder="female, young adult, british accent">
          </div>
          <!-- Clone fields -->
          <div class="col" id="inline-clone-fields" style="display:none">
            <label class="form-label mb-1" style="font-size:.8rem">Reference audio (3-10 s)</label>
            <input type="file" class="form-control form-control-sm" id="inline-ref-audio"
                   accept="audio/*">
          </div>
          <div class="col-12" id="inline-clone-transcript" style="display:none">
            <input type="text" class="form-control form-control-sm" id="inline-ref-text"
                   placeholder="Reference transcript (optional — auto-transcribed if empty)">
          </div>
        </div>
      </div>

      <!-- Expressive tag toolbar -->
      <div class="mb-2">
        <span class="text-secondary me-2" style="font-size:.75rem">TAGS</span>
        <div class="tag-section">
          <span class="text-muted" style="font-size:.7rem">Emotion:</span>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[laughter]')">😂 laughter</button>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[sigh]')">😮‍💨 sigh</button>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[dissatisfaction-hnn]')">😤 dissatisfied</button>
          <span class="text-muted ms-1" style="font-size:.7rem">Question:</span>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[question-en]')">❓ question</button>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[question-ah]')">❓ ..ah</button>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[question-oh]')">❓ ..oh</button>
          <span class="text-muted ms-1" style="font-size:.7rem">Surprise:</span>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[surprise-ah]')">😲 ..ah</button>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[surprise-oh]')">😲 ..oh</button>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[surprise-wa]')">😲 ..wa</button>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[surprise-yo]')">😲 ..yo</button>
          <span class="text-muted ms-1" style="font-size:.7rem">Other:</span>
          <button class="btn btn-sm btn-outline-secondary tag-btn" onclick="insertTag('[confirmation-en]')">✅ confirm</button>
        </div>
      </div>

      <!-- Text input -->
      <textarea class="form-control mb-3" id="text-input" rows="5"
                placeholder="[laughter] Alright, let's get started. This week we shipped something pretty wild…"></textarea>

      <!-- Advanced settings accordion -->
      <div class="accordion accordion-flush mb-3" id="advancedAccordion">
        <div class="accordion-item border-0" style="background:transparent">
          <h2 class="accordion-header">
            <button class="accordion-button collapsed px-0 py-1 text-secondary bg-transparent shadow-none"
                    style="font-size:.8rem" type="button"
                    data-bs-toggle="collapse" data-bs-target="#advancedBody">
              ⚙ Generation settings
            </button>
          </h2>
          <div id="advancedBody" class="accordion-collapse collapse">
            <div class="accordion-body px-0 py-2">
              <div class="row g-3">
                <div class="col-sm-4">
                  <label class="form-label mb-1" style="font-size:.8rem">
                    Speed <span class="text-muted">(1.0 = normal)</span>
                  </label>
                  <input type="number" class="form-control form-control-sm" id="adv-speed"
                         step="0.1" min="0.5" max="2.0" placeholder="1.0">
                </div>
                <div class="col-sm-4">
                  <label class="form-label mb-1" style="font-size:.8rem">
                    Diffusion steps <span class="text-muted">(default 32)</span>
                  </label>
                  <input type="number" class="form-control form-control-sm" id="adv-steps"
                         value="32" min="8" max="64" step="8">
                </div>
                <div class="col-sm-4">
                  <label class="form-label mb-1" style="font-size:.8rem">
                    Guidance scale <span class="text-muted">(default 2.0)</span>
                  </label>
                  <input type="number" class="form-control form-control-sm" id="adv-guidance"
                         value="2.0" step="0.5" min="1.0" max="5.0">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Generate button -->
      <button class="btn btn-primary px-4" id="generate-btn" onclick="generate()">
        <i class="bi bi-play-fill me-1"></i>Generate
      </button>
      <span id="generate-error" class="ms-3 text-danger small"></span>

      <!-- Audio output -->
      <div id="audio-output" class="audio-box mt-3 d-none">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <span class="text-secondary" style="font-size:.8rem">OUTPUT</span>
          <a id="download-link" href="#" download class="btn btn-sm btn-outline-success">
            <i class="bi bi-download me-1"></i>Download
          </a>
        </div>
        <audio controls class="w-100" id="audio-player" preload="auto"></audio>
      </div>

    </div>
  </div>
</div><!-- /col -->
</div><!-- /row -->
</div><!-- /container -->

<!-- ─── Create Voice Modal ──────────────────────────────────── -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-secondary" style="background:#161b22">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Create Voice</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Name + Mode -->
        <div class="row g-3 mb-3">
          <div class="col-sm-6">
            <label class="form-label">Voice name</label>
            <input type="text" class="form-control" id="modal-name" placeholder="Demo Host">
          </div>
          <div class="col-sm-6">
            <label class="form-label">Mode</label>
            <select class="form-select" id="modal-mode" onchange="onModalModeChange()">
              <option value="auto">Auto (random each time)</option>
              <option value="design">Voice Design (describe it)</option>
              <option value="clone">Voice Clone (reference audio)</option>
            </select>
          </div>
        </div>

        <!-- Design panel -->
        <div id="modal-design-panel">
          <label class="form-label">Describe the voice</label>
          <div class="card border-secondary p-3 mb-2" style="background:#0d1117">
            <div class="row g-2">
              <div class="col-6 col-sm-4">
                <label class="form-label mb-1" style="font-size:.8rem">Gender</label>
                <select class="form-select form-select-sm modal-ib" data-key="gender" onchange="rebuildInstruct()">
                  <option value="">—</option>
                  <option>male</option>
                  <option>female</option>
                </select>
              </div>
              <div class="col-6 col-sm-4">
                <label class="form-label mb-1" style="font-size:.8rem">Age</label>
                <select class="form-select form-select-sm modal-ib" data-key="age" onchange="rebuildInstruct()">
                  <option value="">—</option>
                  <option>child</option>
                  <option>teenager</option>
                  <option>young adult</option>
                  <option>middle-aged</option>
                  <option>elderly</option>
                </select>
              </div>
              <div class="col-6 col-sm-4">
                <label class="form-label mb-1" style="font-size:.8rem">Pitch</label>
                <select class="form-select form-select-sm modal-ib" data-key="pitch" onchange="rebuildInstruct()">
                  <option value="">—</option>
                  <option>very low pitch</option>
                  <option>low pitch</option>
                  <option>moderate pitch</option>
                  <option>high pitch</option>
                  <option>very high pitch</option>
                </select>
              </div>
              <div class="col-6 col-sm-4">
                <label class="form-label mb-1" style="font-size:.8rem">Accent</label>
                <select class="form-select form-select-sm modal-ib" data-key="accent" onchange="rebuildInstruct()">
                  <option value="">—</option>
                  <option>american</option>
                  <option>british</option>
                  <option>australian</option>
                  <option>canadian</option>
                  <option>indian</option>
                  <option>chinese</option>
                  <option>korean</option>
                  <option>japanese</option>
                  <option>portuguese</option>
                  <option>russian</option>
                </select>
              </div>
              <div class="col-6 col-sm-4">
                <label class="form-label mb-1" style="font-size:.8rem">Style</label>
                <select class="form-select form-select-sm modal-ib" data-key="style" onchange="rebuildInstruct()">
                  <option value="">—</option>
                  <option>whisper</option>
                </select>
              </div>
            </div>
          </div>
          <label class="form-label mb-1" style="font-size:.8rem">Instruct string (auto-built above, freely editable)</label>
          <input type="text" class="form-control form-control-sm font-monospace" id="modal-instruct"
                 placeholder="female, young adult, british accent">
        </div>

        <!-- Clone panel -->
        <div id="modal-clone-panel" style="display:none">
          <div class="mb-3">
            <label class="form-label">Reference audio <span class="text-muted">(3–10 seconds recommended)</span></label>
            <input type="file" class="form-control" id="modal-ref-audio" accept="audio/*">
          </div>
          <div>
            <label class="form-label">Reference transcript <span class="text-muted">(optional)</span></label>
            <input type="text" class="form-control" id="modal-ref-text"
                   placeholder="Say something… (auto-transcribed by Whisper if left blank)">
          </div>
        </div>

      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="modal-save-btn" onclick="saveVoice()">
          Save Voice
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ─── State ──────────────────────────────────────────────────
let selectedVoice = null;  // null = auto
let voices = [];
const createModal = new bootstrap.Modal(document.getElementById('createModal'));

// ─── Status polling ─────────────────────────────────────────
async function pollStatus() {
  try {
    const r = await fetch('/health');
    const s = await r.json();
    const badge = document.getElementById('status-badge');
    if (s.ready) {
      badge.className = 'badge bg-success';
      badge.innerHTML = `<i class="bi bi-circle-fill me-1"></i>Ready · ${s.device}`;
    } else if (s.loading) {
      badge.className = 'badge bg-warning text-dark';
      badge.innerHTML = `<span class="spin">⟳</span> loading on ${s.device || '…'}`;
      setTimeout(pollStatus, 2000);
    } else if (s.error) {
      badge.className = 'badge bg-danger';
      badge.innerHTML = `<i class="bi bi-exclamation-triangle me-1"></i>Error`;
      badge.title = s.error;
    }
  } catch {
    setTimeout(pollStatus, 3000);
  }
}

// ─── Voice Library ──────────────────────────────────────────
async function loadVoices() {
  const r = await fetch('/voices');
  voices = await r.json();
  renderVoiceList();
}

function renderVoiceList() {
  const list = document.getElementById('voice-list');
  const empty = document.getElementById('voice-list-empty');
  list.innerHTML = '';

  if (voices.length === 0) {
    empty.classList.remove('d-none');
    return;
  }
  empty.classList.add('d-none');

  const modeIcon = { design: 'bi-palette', clone: 'bi-person-voice', auto: 'bi-shuffle' };
  const modeColor = { design: 'text-warning', clone: 'text-info', auto: 'text-secondary' };
  const modeLabel = { design: 'Design', clone: 'Clone', auto: 'Auto' };

  for (const v of voices) {
    const isSelected = selectedVoice && selectedVoice.id === v.id;
    const card = document.createElement('div');
    card.className = `voice-card p-2 rounded border border-secondary ${isSelected ? 'selected' : ''}`;
    card.id = `voice-card-${v.id}`;
    card.innerHTML = `
      <div class="d-flex align-items-start justify-content-between gap-1">
        <div class="flex-grow-1 overflow-hidden" onclick="selectVoice(${JSON.stringify(v).replace(/"/g,"'")})" style="cursor:pointer">
          <div class="d-flex align-items-center gap-1">
            <i class="bi ${modeIcon[v.mode] || 'bi-shuffle'} ${modeColor[v.mode] || ''}" style="font-size:.85rem"></i>
            <span class="fw-medium text-truncate" style="font-size:.85rem">${escHtml(v.name)}</span>
            <span class="badge rounded-pill bg-secondary" style="font-size:.65rem">${modeLabel[v.mode] || v.mode}</span>
          </div>
          <div class="text-muted text-truncate mt-1" style="font-size:.72rem">
            ${v.mode === 'design' ? escHtml(v.instruct || '—') :
              v.mode === 'clone' ? (v.has_ref_audio ? '🎤 Reference audio saved' : 'No audio') :
              'Random each time'}
          </div>
        </div>
        <button class="btn btn-sm btn-outline-danger py-0 px-1 flex-shrink-0" style="font-size:.7rem"
                onclick="deleteVoice('${v.id}')">✕</button>
      </div>`;
    list.appendChild(card);
  }

  // Sync auto card selected state
  document.getElementById('voice-auto-card').classList.toggle('selected', !selectedVoice);
}

function selectVoice(v) {
  selectedVoice = v;
  // Update badge
  const badge = document.getElementById('active-voice-badge');
  if (v) {
    const colors = { design: 'bg-warning text-dark', clone: 'bg-info text-dark', auto: 'bg-secondary' };
    badge.className = `badge ${colors[v.mode] || 'bg-primary'}`;
    badge.textContent = v.name;
    document.getElementById('inline-voice-panel').style.display = 'none';
  } else {
    badge.className = 'badge bg-secondary';
    badge.textContent = 'Auto';
    document.getElementById('inline-voice-panel').style.display = '';
  }
  renderVoiceList();
}

async function deleteVoice(id) {
  if (!confirm('Delete this voice?')) return;
  await fetch(`/voices/${id}`, { method: 'DELETE' });
  if (selectedVoice && selectedVoice.id === id) selectVoice(null);
  await loadVoices();
}

// ─── Inline voice params ─────────────────────────────────────
function onInlineModeChange() {
  const mode = document.getElementById('inline-mode').value;
  document.getElementById('inline-design-fields').style.display = mode === 'design' ? '' : 'none';
  document.getElementById('inline-clone-fields').style.display = mode === 'clone' ? '' : 'none';
  document.getElementById('inline-clone-transcript').style.display = mode === 'clone' ? '' : 'none';
}

// ─── Tag insertion ───────────────────────────────────────────
function insertTag(tag) {
  const ta = document.getElementById('text-input');
  const start = ta.selectionStart, end = ta.selectionEnd;
  ta.setRangeText(tag, start, end, 'end');
  ta.focus();
}

// ─── Generate ────────────────────────────────────────────────
async function generate() {
  const btn = document.getElementById('generate-btn');
  const errEl = document.getElementById('generate-error');
  const text = document.getElementById('text-input').value.trim();
  errEl.textContent = '';

  if (!text) { errEl.textContent = 'Please enter some text.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> Generating…';

  try {
    const fd = new FormData();
    fd.append('text', text);
    fd.append('num_step', document.getElementById('adv-steps').value || '32');
    fd.append('guidance_scale', document.getElementById('adv-guidance').value || '2.0');
    const speed = document.getElementById('adv-speed').value;
    if (speed) fd.append('speed', speed);

    if (selectedVoice) {
      fd.append('voice_id', selectedVoice.id);
    } else {
      const mode = document.getElementById('inline-mode').value;
      fd.append('mode', mode);
      if (mode === 'design') {
        fd.append('instruct', document.getElementById('inline-instruct').value);
      } else if (mode === 'clone') {
        const f = document.getElementById('inline-ref-audio').files[0];
        if (f) fd.append('ref_audio', f);
        fd.append('ref_text', document.getElementById('inline-ref-text').value);
      }
    }

    const r = await fetch('/generate', { method: 'POST', body: fd });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || r.statusText);

    const audioUrl = data.audio_url;
    const player = document.getElementById('audio-player');
    const dlLink = document.getElementById('download-link');
    player.src = audioUrl;
    dlLink.href = audioUrl;
    dlLink.download = audioUrl.split('/').pop();
    document.getElementById('audio-output').classList.remove('d-none');
    player.play().catch(() => {});
  } catch (e) {
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-play-fill me-1"></i>Generate';
  }
}

// ─── Create Voice Modal ──────────────────────────────────────
function openCreateModal() {
  // Reset
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-mode').value = 'auto';
  document.getElementById('modal-instruct').value = '';
  document.getElementById('modal-ref-text').value = '';
  document.getElementById('modal-ref-audio').value = '';
  document.querySelectorAll('.modal-ib').forEach(s => s.value = '');
  onModalModeChange();
}

function onModalModeChange() {
  const mode = document.getElementById('modal-mode').value;
  document.getElementById('modal-design-panel').style.display = mode === 'design' ? '' : 'none';
  document.getElementById('modal-clone-panel').style.display = mode === 'clone' ? '' : 'none';
}

function rebuildInstruct() {
  const parts = [];
  document.querySelectorAll('.modal-ib').forEach(sel => {
    if (sel.value) parts.push(sel.value);
  });
  document.getElementById('modal-instruct').value = parts.join(', ');
}

async function saveVoice() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { alert('Please enter a voice name.'); return; }

  const mode = document.getElementById('modal-mode').value;
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const fd = new FormData();
    fd.append('name', name);
    fd.append('mode', mode);
    if (mode === 'design') {
      fd.append('instruct', document.getElementById('modal-instruct').value);
    } else if (mode === 'clone') {
      const f = document.getElementById('modal-ref-audio').files[0];
      if (!f) { alert('Please select a reference audio file.'); return; }
      fd.append('ref_audio', f);
      fd.append('ref_text', document.getElementById('modal-ref-text').value);
    }
    const r = await fetch('/voices', { method: 'POST', body: fd });
    if (!r.ok) throw new Error((await r.json()).detail);
    createModal.hide();
    await loadVoices();
  } catch (e) {
    alert('Error saving voice: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Voice';
  }
}

// ─── Helpers ─────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────
pollStatus();
loadVoices();
</script>
</body>
</html>
