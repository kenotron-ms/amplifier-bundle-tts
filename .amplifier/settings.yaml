# Project-scoped settings for the omnivoice bundle.
# Only active when running `amplifier run` from this directory.
#
# NOTE: bundle.app lists REPLACE global ones (don't merge).
# We intentionally omit bundle.app here so the global app bundles
# (lifeos, m365, dev-machine, etc.) still load on top.
bundle:
  active: text-to-speech-dev
  added:
    text-to-speech: ./bundle.md
    text-to-speech-dev: ./.amplifier/text-to-speech-dev.md
